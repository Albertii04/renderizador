name: desktop-release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (optional — reads package.json if empty)"
        required: false

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Build + package Windows installer
        run: pnpm --filter @renderizador/desktop pack:win

      - name: Publish artifacts to Supabase Storage
        run: pnpm --filter @renderizador/desktop release:publish

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: renderizador-desktop-windows
          path: apps/desktop/release/*.exe
          if-no-files-found: error
