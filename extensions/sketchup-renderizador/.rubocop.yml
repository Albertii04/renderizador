AllCops:
  TargetRubyVersion: 2.7
  NewCops: enable
  Include:
    - "ruby_extension/**/*.rb"
    - "Rakefile"
  Exclude:
    - "python_parser/**/*"
    - "dist/**/*"
    - "vendor/**/*"
    - "PREVIOUS_README.md"

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Metrics/MethodLength:
  Max: 25
